<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacob's Machine</title>

    <link rel="icon" href="coracao.png">

    <style>
        body {
            background-color: #fff0f8;
            font-family: Arial, sans-serif;
            color: #6b21a8;
            text-align: center;
            padding: 2rem;
            cursor: url("uni.png") 0 0, auto;
        }

        h1 {
            color: #e0559a;
        }

        h2 {
            color: #e0559a;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .caixa {
            background: white;
            border: 2px solid #f9a8d4;
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 600px;
            margin: 1rem auto;
            text-align: left;
        }

        input,
        select {
            border: 2px solid #f9a8d4;
            border-radius: 8px;
            padding: 0.4rem 0.6rem;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        button {
            background-color: #f472b6;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            cursor: url("uni.png") 0 0, pointer;
        }

        p {
            margin-top: 0.5rem;
            color: #9d4edd;
        }

        .erro {
            color: red;
        }

        .resultado-calculo {
            margin-top: 1rem;
            background: #fdf2f8;
            border-left: 5px solid #f472b6;
            border-radius: 8px;
            padding: 0.75rem;
            color: #e0559a;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Jacob's Machine ✨</h1>
    <p>🌸 Conversora de Bases 🌸</p>

    <!-- conversão -->
    <div class="caixa">
        <h2>Converter Número 🔢</h2>

        De qual base é o número?
        <select id="selectBaseEntrada">
            <option value="2">Binário (2)</option>
            <option value="8">Octal (8)</option>
            <option value="10" selected>Decimal (10)</option>
            <option value="16">Hexadecimal (16)</option>
        </select>

        <br><br>

        <input id="inputNumero" type="text" placeholder="número para ser convertido">
        <br>
        <button onclick="converter()">Converter 💖</button>

        <p>Binário: <span id="resultadoBinario">—</span></p>
        <p>Octal: <span id="resultadoOctal">—</span></p>
        <p>Decimal: <span id="resultadoDecimal">—</span></p>
        <p>Hexadecimal: <span id="resultadoHexadecimal">—</span></p>

        <p class="erro" id="erroConversao"></p>
    </div>

    <!-- calculo -->
    <div class="caixa">
        <h2>Calcular Entre Bases ✨</h2>

        Valor A: <input id="inputValorA" type="text" placeholder="primeiro número" size="8">
        Base:
        <select id="selectBaseA">
            <option value="2">Binário (2)</option>
            <option value="8">Octal (8)</option>
            <option value="10" selected>Decimal (10)</option>
            <option value="16">Hexadecimal (16)</option>
        </select>

        <br><br>

        Operação:
        <select id="selectOperacao">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>

        <br><br>

        Valor B: <input id="inputValorB" type="text" placeholder="segundo número" size="8">
        Base:
        <select id="selectBaseB">
            <option value="2">Binário (2)</option>
            <option value="8">Octal (8)</option>
            <option value="10" selected>Decimal (10)</option>
            <option value="16">Hexadecimal (16)</option>
        </select>

        <br><br>

        Resultado em:
        <select id="selectBaseResultado">
            <option value="2">Binário (2)</option>
            <option value="8">Octal (8)</option>
            <option value="10" selected>Decimal (10)</option>
            <option value="16">Hexadecimal (16)</option>
        </select>

        <br><br>
        <button onclick="calcular()">Calcular ✨</button>

        <div class="resultado-calculo" id="resultadoCalculo">
            Esperando cálculo...
        </div>

        <p class="erro" id="erroCalculo"></p>
    </div>

    <p>💀 Conversora sinistra 💀</p>

    <script>
        // conversao
        function converter() {
            var numeroDigitado = inputNumero.value.trim().toUpperCase();
            var baseDeEntrada = parseInt(selectBaseEntrada.value);

            erroConversao.innerHTML = "";

            var numeroEmDecimal = parseInt(numeroDigitado, baseDeEntrada);

            if (isNaN(numeroEmDecimal)) {
                erroConversao.innerHTML = "⚠️ Número inválido para a base escolhida!";
            }

            resultadoBinario.innerHTML = numeroEmDecimal.toString(2);
            resultadoOctal.innerHTML = numeroEmDecimal.toString(8).toUpperCase();
            resultadoDecimal.innerHTML = numeroEmDecimal.toString(10);
            resultadoHexadecimal.innerHTML = numeroEmDecimal.toString(16).toUpperCase();
        }

        // calculo
        function calcular() {
            var valorA = inputValorA.value.trim().toUpperCase();
            var valorB = inputValorB.value.trim().toUpperCase();
            var baseA = parseInt(selectBaseA.value);
            var baseB = parseInt(selectBaseB.value);
            var operacao = selectOperacao.value;
            var baseResultado = parseInt(selectBaseResultado.value);

            erroCalculo.innerHTML = "";

            var valorAemDecimal = parseInt(valorA, baseA);
            var valorBemDecimal = parseInt(valorB, baseB);

            if (isNaN(valorAemDecimal)) { 
                erroCalculo.innerHTML = "⚠️ Valor A inválido para a base escolhida."; 
                return; 
            }
            if (isNaN(valorBemDecimal)) { 
                erroCalculo.innerHTML = "⚠️ Valor B inválido para a base escolhida."; 
            return; 
        }

            // conta decimal
            var resultadoEmDecimal;
            if (operacao == "+") resultadoEmDecimal = valorAemDecimal + valorBemDecimal;
            if (operacao == "-") resultadoEmDecimal = valorAemDecimal - valorBemDecimal;
            if (operacao == "*") resultadoEmDecimal = valorAemDecimal * valorBemDecimal;
            if (operacao == "/") {
                if (valorBemDecimal == 0) { 
                    erroCalculo.innerHTML = "⚠️ Divisão por zero!"; return; 
                }
                resultadoEmDecimal = valorAemDecimal / valorBemDecimal;
            }

            // conversa
            var resultadoFinal;
            if (Number.isInteger(resultadoEmDecimal)) {
                resultadoFinal = resultadoEmDecimal.toString(baseResultado).toUpperCase();
            } else {
                resultadoFinal = resultadoEmDecimal.toFixed(4);
            }

            resultadoCalculo.innerHTML =
                resultadoFinal + " 🎉" +
                "<br>" +
                valorA + " (base " + baseA + ") " + operacao + " " + valorB + " (base " + baseB + ")" +
                " = " + resultadoEmDecimal + " → base " + baseResultado;
        }
    </script>

</body>

</html>
